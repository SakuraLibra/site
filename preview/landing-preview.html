<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] } } } }
  </script>
  <style>
    body { background: #f9fafb; }
    @keyframes marquee-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .marquee-track { animation: marquee-scroll 38s linear infinite; will-change: transform; }
    .marquee-root:hover .marquee-track { animation-play-state: paused; }
  </style>
</head>
<body class="font-sans">
  <div class="px-6 py-10">
    <!-- HERO -->
    <section class="relative w-full max-w-[1400px] mx-auto rounded-[48px] bg-white shadow-[0_40px_100px_-20px_rgba(0,0,0,0.03)] overflow-hidden h-[600px] flex flex-col">
      <div class="absolute inset-0 pointer-events-none z-0 overflow-hidden select-none">
        <video autoplay loop muted playsinline class="w-full h-full object-cover scale-105 transition-transform duration-1000"
          src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260505_101331_74f9b798-3f00-4e86-8a01-377aa16ffeaa.mp4"></video>
      </div>

      <div class="absolute inset-0 z-10 pointer-events-none select-none overflow-hidden">
        <div id="fan" class="absolute" style="right:-150px; top:50%;"></div>
      </div>

      <div class="relative z-20 flex-1 px-8 md:px-16 pt-12 md:pt-16 flex flex-col items-start">
        <h1 class="font-display text-[42px] md:text-[56px] font-medium tracking-tight leading-[1.04] text-[#0a1b33]">
          Foundation of the<br />new digital epoch
        </h1>
        <p class="mt-5 max-w-md text-[14px] md:text-[15px] leading-relaxed text-[#64748b]">
          Designing products, powering ecosystems and laying the foundation of a decentralized web for enterprises, builders and communities alike.
        </p>
        <button class="mt-8 bg-[#0a152d] text-white rounded-full px-7 py-3 text-[14px] font-semibold hover:scale-105 transition-transform">Contact Us</button>
      </div>

      <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-30">
        <nav class="flex items-center bg-white/90 backdrop-blur-2xl px-1.5 py-1.5 rounded-full shadow-[0_12px_40px_rgba(0,0,0,0.08)] border border-slate-200/40">
          <button class="w-9 h-9 bg-white border border-slate-100 shadow-sm rounded-full flex items-center justify-center text-[#0a1b33] text-[13px]">✦</button>
          <button class="px-4 py-2 text-[12px] font-semibold text-slate-500 hover:text-[#0a1b33] transition-colors">About</button>
          <button class="px-4 py-2 text-[12px] font-semibold text-slate-500 hover:text-[#0a1b33] transition-colors">Work</button>
          <button class="px-4 py-2 text-[12px] font-semibold text-slate-500 hover:text-[#0a1b33] transition-colors">Skills</button>
          <button class="px-4 py-2 text-[12px] font-semibold text-slate-500 hover:text-[#0a1b33] transition-colors">Experience</button>
          <button class="ml-1.5 inline-flex items-center gap-1 bg-white px-5 py-2 rounded-full text-[12px] font-semibold text-[#0a1b33] border border-slate-200/60 shadow-sm hover:border-slate-300 transition-all">
            Get in touch
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
        </nav>
      </div>
    </section>

    <!-- MARQUEE -->
    <div class="marquee-root relative mt-10 w-full max-w-[1400px] mx-auto overflow-hidden"
      style="mask-image: linear-gradient(to right, transparent, #000 8%, #000 92%, transparent); -webkit-mask-image: linear-gradient(to right, transparent, #000 8%, #000 92%, transparent);">
      <div class="marquee-track flex w-max" id="track"></div>
    </div>
  </div>

  <script>
    const LOGOS = [
      { src: 'https://svgl.app/library/procure.svg', alt: 'Procure', from: '#1e3a8a', to: '#3b82f6' },
      { src: 'https://svgl.app/library/shopify.svg', alt: 'Shopify', from: '#ca8a04', to: '#facc15' },
      { src: 'https://svgl.app/library/blender.svg', alt: 'Blender', from: '#1d4ed8', to: '#38bdf8' },
      { src: 'https://svgl.app/library/figma.svg', alt: 'Figma', from: '#6d28d9', to: '#a855f7' },
      { src: 'https://svgl.app/library/spotify.svg', alt: 'Spotify', from: '#db2777', to: '#ef4444' },
      { src: 'https://svgl.app/library/lottielab.svg', alt: 'Lottielab', from: '#ca8a04', to: '#22c55e' },
      { src: 'https://svgl.app/library/google-cloud.svg', alt: 'Google Cloud', from: '#38bdf8', to: '#93c5fd' },
      { src: 'https://svgl.app/library/bing.svg', alt: 'Bing', from: '#06b6d4', to: '#14b8a6' },
    ]
    const track = document.getElementById('track')
    ;[...LOGOS, ...LOGOS].forEach((l) => {
      const card = document.createElement('div')
      card.className = 'group relative h-24 w-40 mr-5 shrink-0 flex items-center justify-center rounded-full bg-white border border-slate-200/60 shadow-sm hover:border-slate-300 transition-all overflow-hidden'
      card.innerHTML =
        '<div class="absolute inset-0 scale-150 opacity-0 transition-all duration-500 group-hover:scale-100 group-hover:opacity-100" style="background: linear-gradient(135deg, ' + l.from + ', ' + l.to + ')"></div>' +
        '<img src="' + l.src + '" alt="' + l.alt + '" class="relative z-10 h-7 w-auto max-w-[96px] object-contain transition-all duration-500 group-hover:brightness-0 group-hover:invert" />'
      track.appendChild(card)
    })

    // Glass piano-key fan: long keys sharing one pivot (right edge), rotated to splay out.
    const fan = document.getElementById('fan')
    const KEYS = [-8, 6, 20, 34, 48, 62, 76]
    const LEN = 600, THICK = 86, RADIUS = 22
    KEYS.forEach((ang, i) => {
      const k = document.createElement('div')
      k.style.cssText = [
        'position:absolute', 'right:0px', 'top:0px',
        'width:' + LEN + 'px', 'height:' + THICK + 'px',
        'margin-top:' + (-THICK / 2) + 'px',
        'transform-origin:right center',
        'transform:rotate(' + ang + 'deg)',
        'border-radius:' + RADIUS + 'px',
        'background:linear-gradient(150deg, rgba(255,255,255,0.58), rgba(236,242,252,0.16) 55%, rgba(208,220,242,0.30))',
        'backdrop-filter:blur(5px)', '-webkit-backdrop-filter:blur(5px)',
        'border:1px solid rgba(255,255,255,0.7)',
        'box-shadow:0 24px 50px -18px rgba(20,40,80,0.32), inset 0 1px 0 rgba(255,255,255,0.9), inset 0 -24px 44px -28px rgba(90,120,170,0.55)',
      ].join(';')
      const cap = document.createElement('div')
      cap.style.cssText = 'position:absolute; left:14px; top:10px; bottom:10px; width:30px; border-radius:18px; background:linear-gradient(180deg, rgba(255,255,255,0.75), rgba(255,255,255,0.05))'
      k.appendChild(cap)
      fan.appendChild(k)
    })
  </script>
</body>
</html>
