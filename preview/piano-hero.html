<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piano hero preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #eef0f3; font-family: 'Hanken Grotesk', sans-serif; }
    .wrap { padding: 32px; }
    .hero {
      position: relative; width: 100%; max-width: 1400px; margin: 0 auto;
      height: 600px; border-radius: 48px; overflow: hidden;
      background: linear-gradient(135deg, #fdf2ec 0%, #f4f7fb 46%, #eef8f1 100%);
      box-shadow: 0 40px 100px -20px rgba(0,0,0,0.06);
    }
    /* colorful wash blobs (image 2 style) */
    .blob { position: absolute; border-radius: 50%; filter: blur(70px); pointer-events: none; }
    .b1 { width: 460px; height: 460px; background: #ffb59e; left: -120px; top: -160px; opacity: .55; }
    .b2 { width: 420px; height: 420px; background: #ffd27a; right: 8%; bottom: -200px; opacity: .5; }
    .b3 { width: 400px; height: 400px; background: #9fe0b4; right: -120px; top: -110px; opacity: .5; }
    .b4 { width: 360px; height: 360px; background: #a9c7f5; left: 30%; bottom: -180px; opacity: .45; }

    /* waveform centered on vertical axis */
    .wave { position: absolute; inset: 0; z-index: 5; pointer-events: none; }
    .wave canvas { display:block; width:100%; height:100%; }

    /* hero copy */
    .copy { position: absolute; z-index: 20; left: 104px; top: 56px; max-width: 560px; }
    .copy .eyebrow { font-family: 'Hanken Grotesk', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase; color: #3568e0; }
    .copy h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 60px; line-height: 0.98; letter-spacing: -0.01em; color: #1a2438; margin: 16px 0 0; }
    .copy h1 em { font-style: italic; font-weight: 500; color: #b07f17; }
    .copy p { font-family: 'Hanken Grotesk', sans-serif; font-size: 16px; line-height: 1.65; color: #5c6678; margin: 18px 0 0; max-width: 440px; }
    .actions { margin-top: 30px; display: flex; gap: 14px; flex-wrap: wrap; }
    .btn { font-family: 'Hanken Grotesk', sans-serif; font-weight: 700; font-size: 15px; padding: 14px 28px; border-radius: 999px; border: none; cursor: pointer; white-space: nowrap; }
    .btn-dark { background: #0a152d; color: #fff; }
    .btn-gold { background: #e6a52c; color: #15161c; }

    /* horizontal glass bars, vertically centered on the right */
    .board-clip { position: absolute; inset: 0; z-index: 12; overflow: hidden; pointer-events: none; }
    .board {
      position: absolute; left: 53%; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; align-items: flex-start; gap: 18px;
      transform-origin: center; pointer-events: auto;
    }
    .key {
      position: relative; width: 440px; height: 68px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: inset 0 -2px 0 rgba(255,255,255,0.42), inset 0 -6px 7px -3px rgba(255,255,255,0.2), 7px 12px 24px -8px rgba(120,150,210,0.45), 0 30px 60px -30px rgba(20,30,60,0.4);
      backdrop-filter: blur(8px) saturate(1.25); -webkit-backdrop-filter: blur(8px) saturate(1.25);
      display: flex; flex-direction: row; align-items: center; justify-content: flex-start; padding: 0 26px; gap: 16px;
      cursor: pointer; transition: transform .14s ease, filter .14s ease;
    }
    .key:active { transform: translateY(5px); filter: brightness(1.08); }
    .tile { width: 44px; height: 44px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-weight: 600; font-size: 21px; background: rgba(0,0,0,0.14); flex: none; }
    .word { font-family: 'Fraunces', serif; font-weight: 600; font-size: 20px; opacity: .92; }
    .play { margin-left: auto; font-size: 13px; opacity: .55; }
    /* black keys */
    .black {
      position: absolute; right: 0; width: 230px; height: 48px; border-radius: 10px;
      background: linear-gradient(180deg, rgba(14,15,22,0.82), rgba(14,15,22,0.72));
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: inset 0 -2px 0 rgba(255,255,255,0.32), inset 0 -7px 8px -3px rgba(255,255,255,0.16), 7px 12px 24px -8px rgba(40,50,80,0.5), 0 22px 40px -16px rgba(0,0,0,0.4);
      backdrop-filter: blur(16px) saturate(1.2); -webkit-backdrop-filter: blur(16px) saturate(1.2);
      display: flex; align-items: center; justify-content: flex-start; padding-left: 22px; color: rgba(255,255,255,0.5); font-weight: 700; font-size: 13px;
      cursor: pointer; z-index: 3;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <span class="blob b1"></span>
      <span class="blob b2"></span>
      <span class="blob b3"></span>
      <span class="blob b4"></span>

      <div class="wave"><canvas id="strands"></canvas></div>

      <div class="copy">
        <span class="eyebrow">Edinburgh, UK · Sound</span>
        <h1>A studio<br/>for <em>sound</em>.</h1>
        <p>A cozy little studio for making sound — from the first take to the final master.</p>
        <div class="actions">
          <button class="btn btn-dark">Play Music</button>
        </div>
      </div>

      <div class="board-clip">
        <div class="board" id="board"></div>
      </div>
    </div>
  </div>

  <script>
    const KEYS = [
      { letter: 'A', word: 'About', color: '52,104,224', fg: '#fff' },
      { letter: 'W', word: 'Work', color: '230,165,44', fg: '#3a2c08' },
      { letter: 'S', word: 'Skills', color: '236,226,203', fg: '#3a3322' },
      { letter: 'C', word: 'Contact', color: '28,63,150', fg: '#fff' },
      { letter: '\u2605', word: 'Playground', color: '169,199,245', fg: '#1a2438' },
    ]
    const BLACKS = [{ after: 0, label: 'Z' }, { after: 2, label: 'X' }, { after: 3, label: 'Q' }]
    const KEY_H = 68, GAP = 10, BLACK_H = 48
    const board = document.getElementById('board')
    KEYS.forEach((k, i) => {
      const el = document.createElement('div')
      el.className = 'key'
      el.style.background = 'linear-gradient(180deg, rgba(' + k.color + ',0.96), rgba(' + k.color + ',0.86))'
      el.style.color = k.fg
      el.innerHTML = '<span class="tile" style="color:' + k.fg + '">' + k.letter + '</span><span class="word">' + k.word + '</span><span class="play">\u25B6</span>'
      board.appendChild(el)
      const bk = BLACKS.find(b => b.after === i)
      if (bk) {
        const b = document.createElement('div')
        b.className = 'black'
        b.style.top = (i * (68 + 18) + 68 + 18 / 2 - 48 / 2) + 'px'
        b.textContent = bk.label
        board.appendChild(b)
      }
    })
  </script>

  <script type="module">
    window.__strandsErr = null;
    try {
    const { Renderer, Program, Mesh, Triangle, Color } = await import('https://esm.sh/ogl@1.0.11');
    const MAX_STRANDS = 12, MAX_COLORS = 8;
    const VERT = `#version 300 es\nin vec2 position;\nvoid main(){ gl_Position = vec4(position,0.,1.); }`;
    const FRAG = `#version 300 es
precision highp float;
uniform float uTime; uniform vec2 uResolution;
uniform vec3 uColors[${MAX_COLORS}]; uniform int uColorCount; uniform int uStrandCount;
uniform float uSpeed,uAmplitude,uWaviness,uThickness,uGlow,uTaper,uSpread,uHueShift,uIntensity,uOpacity,uScale,uSaturation;
out vec4 fragColor; const float PI=3.14159265;
vec3 samplePalette(float t){ t=fract(t); float s=t*float(uColorCount); int i=int(floor(s)); float b=fract(s); int n=i+1; if(n>=uColorCount)n=0; return mix(uColors[i],uColors[n],b); }
void main(){
  vec2 uv=(gl_FragCoord.xy-0.5*uResolution)/uResolution.y; uv/=max(uScale,0.0001);
  float e=0.06+uIntensity*0.94; float env=pow(max(cos(uv.x*PI*1.3),0.0),uTaper); vec3 col=vec3(0.0);
  for(int i=0;i<${MAX_STRANDS};i++){ if(i>=uStrandCount)break; float fi=float(i);
    float ph=fi*1.7*uSpread; float freq=(2.0+fi*0.35)*uWaviness; float spd=1.4+fi*1.2; float tt=uTime*uSpeed;
    float w=sin(uv.x*freq+tt*spd+ph)*0.6+sin(uv.x*freq*1.1-tt*spd*0.7+ph*1.7)*0.4;
    float amp=(0.1+0.02*e)*env*uAmplitude; float y=w*amp; float d=abs(uv.y-y);
    float thick=(0.001+0.05*e)*(0.35+env)*uThickness; float g=thick/(d+thick*0.45); g=g*g;
    float h=fi/float(uStrandCount)+uv.x*0.3+uTime*0.04+uHueShift; col+=samplePalette(h)*g*env; }
  col*=0.45+0.7*e; col=1.0-exp(-col*uGlow);
  float gray=dot(col,vec3(0.2126,0.7152,0.0722)); col=max(mix(vec3(gray),col,uSaturation),0.0);
  float lum=max(max(col.r,col.g),col.b); float alpha=clamp(lum,0.0,1.0)*uOpacity;
  fragColor=vec4(col*uOpacity,alpha); }`;
    const PALETTE = ['#3568e0','#e6a52c','#4cae8a','#6f8ff5'];
    function buildPalette(){ const out=[]; for(let i=0;i<MAX_COLORS;i++){ const c=new Color(PALETTE[i]??PALETTE[PALETTE.length-1]); out.push([c.r,c.g,c.b]); } return out; }
    const canvas = document.getElementById('strands');
    const ctn = canvas.parentElement;
    const renderer = new Renderer({ alpha:true, premultipliedAlpha:true, antialias:true, canvas });
    const gl = renderer.gl; gl.clearColor(0,0,0,0); gl.enable(gl.BLEND); gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
    const geometry = new Triangle(gl); if (geometry.attributes.uv) delete geometry.attributes.uv;
    const program = new Program(gl, { vertex:VERT, fragment:FRAG, uniforms:{
      uTime:{value:0}, uResolution:{value:[ctn.offsetWidth,ctn.offsetHeight]}, uColors:{value:buildPalette()},
      uColorCount:{value:PALETTE.length}, uStrandCount:{value:4}, uSpeed:{value:0.5}, uAmplitude:{value:1.0},
      uWaviness:{value:1.1}, uThickness:{value:0.75}, uGlow:{value:2.4}, uTaper:{value:3.0}, uSpread:{value:1.0},
      uHueShift:{value:0.0}, uIntensity:{value:0.6}, uOpacity:{value:1.0}, uScale:{value:1.5}, uSaturation:{value:1.4} } });
    const mesh = new Mesh(gl, { geometry, program });
    function resize(){ renderer.setSize(ctn.offsetWidth, ctn.offsetHeight); program.uniforms.uResolution.value=[ctn.offsetWidth,ctn.offsetHeight]; }
    window.addEventListener('resize', resize); resize();
    function frame(t){ requestAnimationFrame(frame); program.uniforms.uTime.value=t*0.001; renderer.render({ scene: mesh }); }
    requestAnimationFrame(frame);
    window.__strandsLoaded = true;
    } catch (e) { window.__strandsErr = String(e && e.stack || e); console.error('strands failed', e); }
  </script>
</body>
</html>
