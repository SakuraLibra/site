<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sakura Hero — Interactive</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#14110f;padding:20px;gap:16px;
    font-family:ui-sans-serif,system-ui,"PingFang SC","Microsoft YaHei",sans-serif;
  }

  .hero{
    position:relative;width:100%;max-width:1200px;aspect-ratio:1477/1065;
    border-radius:14px;overflow:hidden;isolation:isolate;background:#2a2a20;
    box-shadow:0 30px 90px -25px rgba(0,0,0,.75),0 0 0 1px rgba(255,255,255,.06);
  }
  .hero__img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;image-rendering:pixelated}

  /* --- sun shafts --- */
  .shafts{
    position:absolute;inset:-25%;pointer-events:none;mix-blend-mode:screen;
    opacity:.5;transform:rotate(22deg);
    background:
      linear-gradient(90deg,transparent 12%,rgba(255,232,180,.16) 15%,transparent 19%),
      linear-gradient(90deg,transparent 26%,rgba(255,240,200,.11) 30%,transparent 35%),
      linear-gradient(90deg,transparent 41%,rgba(255,228,175,.13) 44%,transparent 50%),
      linear-gradient(90deg,transparent 57%,rgba(255,238,195,.08) 60%,transparent 65%);
    animation:breathe 11s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{opacity:.38;transform:rotate(22deg) translateX(0)}
    50%{opacity:.60;transform:rotate(22deg) translateX(1.2%)}
  }

  /* --- dappled light --- */
  .dapple{position:absolute;inset:0;pointer-events:none;mix-blend-mode:soft-light}
  .dapple i{position:absolute;display:block;border-radius:50%;filter:blur(14px);
    background:radial-gradient(circle,rgba(255,240,205,.85),rgba(255,240,205,0) 70%)}
  .d1{left:26%;top:56%;width:16%;height:11%;animation:drift1 17s ease-in-out infinite}
  .d2{left:44%;top:70%;width:12%;height:8%;animation:drift2 23s ease-in-out infinite}
  .d3{left:8%;top:74%;width:19%;height:12%;animation:drift1 29s ease-in-out infinite reverse}
  .d4{left:62%;top:18%;width:14%;height:10%;animation:drift2 19s ease-in-out infinite}
  @keyframes drift1{0%,100%{transform:translate(0,0) scale(1);opacity:.45}50%{transform:translate(4%,-2%) scale(1.15);opacity:.8}}
  @keyframes drift2{0%,100%{transform:translate(0,0) scale(1.1);opacity:.7}50%{transform:translate(-3%,2%) scale(.9);opacity:.4}}

  .fx{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;image-rendering:pixelated}
  .grade{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 100% at 30% 30%,rgba(255,228,170,.10),rgba(20,14,30,.28) 100%)}

  /* ============================================================
     INTERACTIVE HOTSPOTS
     ============================================================ */
  .spots{position:absolute;inset:0;z-index:5}

  .spot{
    position:absolute;appearance:none;background:none;border:0;padding:0;margin:0;
    cursor:pointer;outline:none;
    transition:backdrop-filter .18s ease, transform .18s ease;
  }
  /* the artwork itself lights up — no fake glow panel */
  .spot:hover,.spot:focus-visible{
    backdrop-filter:brightness(1.18) saturate(1.12) contrast(1.03);
    -webkit-backdrop-filter:brightness(1.18) saturate(1.12) contrast(1.03);
  }
  .spot:active{transform:translateY(2px)}

  /* marching-ants pixel border, drawn as 4 dashed strips */
  .spot::before{
    content:'';position:absolute;inset:0;opacity:0;
    transition:opacity .18s ease;
    background:
      repeating-linear-gradient(90deg,#fff6e2 0 7px,transparent 7px 14px) left top/100% 3px no-repeat,
      repeating-linear-gradient(90deg,#fff6e2 0 7px,transparent 7px 14px) left bottom/100% 3px no-repeat,
      repeating-linear-gradient(180deg,#fff6e2 0 7px,transparent 7px 14px) left top/3px 100% no-repeat,
      repeating-linear-gradient(180deg,#fff6e2 0 7px,transparent 7px 14px) right top/3px 100% no-repeat;
    filter:drop-shadow(0 0 3px rgba(255,220,150,.9));
  }
  .spot:hover::before,.spot:focus-visible::before{opacity:1;animation:ants 1.4s linear infinite}
  @keyframes ants{to{background-position:14px top,14px bottom,left 14px,right 14px}}

  /* idle marker: a small pixel diamond so people know it's clickable */
  .spot .pin{
    position:absolute;left:50%;top:50%;width:14px;height:14px;margin:-7px 0 0 -7px;
    transform:rotate(45deg);
    background:#fff2d4;box-shadow:0 0 0 3px rgba(96,60,40,.55),0 0 12px rgba(255,215,140,.8);
    transition:opacity .35s ease;
    animation:pin 2.4s ease-in-out infinite;
  }
  @keyframes pin{0%,100%{opacity:.55;scale:1}50%{opacity:1;scale:1.25}}
  .spots.touched .pin{opacity:0}
  .spot:hover .pin,.spot:focus-visible .pin{opacity:0}

  /* --- sticky-note label, matching the notes already in the artwork --- */
  .note{
    position:absolute;z-index:6;pointer-events:none;
    background:#f2d162;color:#41341a;
    padding:8px 11px 9px;
    box-shadow:2px 3px 0 rgba(90,66,20,.45),0 8px 20px -6px rgba(0,0,0,.5);
    opacity:0;transform:translateY(7px) rotate(var(--rot,-2deg)) scale(.94);
    transition:opacity .16s ease,transform .16s cubic-bezier(.2,1.5,.4,1);
    line-height:1.15;white-space:nowrap;
  }
  .note::after{ /* torn top edge — pixel notch strip */
    content:'';position:absolute;left:0;right:0;top:0;height:3px;
    background:repeating-linear-gradient(90deg,#e5bf4c 0 4px,#f2d162 4px 8px);
  }
  .note b{display:block;font-size:clamp(12px,1.35vw,17px);font-weight:700;letter-spacing:.5px}
  .note span{display:block;font-size:clamp(8px,.85vw,10px);letter-spacing:.22em;opacity:.62;margin-top:3px;text-transform:uppercase}
  .spot:hover + .note,.spot:focus-visible + .note{
    opacity:1;transform:translateY(0) rotate(var(--rot,-2deg)) scale(1);
  }

  /* touch devices: no hover, so keep the notes visible */
  @media (hover:none){
    .note{opacity:.94;transform:translateY(0) rotate(var(--rot,-2deg)) scale(.88)}
    .spot .pin{opacity:.7}
  }
  @media (prefers-reduced-motion:reduce){
    .shafts,.dapple i,.pin{animation:none!important}
    .spot:hover::before{animation:none}
  }

  .readout{color:#c9bfae;font-size:13px;letter-spacing:.06em;min-height:20px}
  .readout b{color:#f2d162}
</style>
</head>

  <div class="shafts"></div>
  <div class="dapple"><i class="d1"></i><i class="d2"></i><i class="d3"></i><i class="d4"></i></div>
  <canvas class="fx" id="fx"></canvas>
  <div class="grade"></div>
  <div class="spots" id="spots"></div>
</div>

<p class="readout" id="readout">把鼠标移到画面上的光点试试 —— 电脑 / 钢琴 / 日历 / 人物</p>

<script>
/* ==================================================================
   HOTSPOTS — tune box{} and note{} in % of the frame
   ================================================================== */
const SPOTS = [
  { id:'work',       cn:'作品',  en:'Work',
    box:{ left:36.1, top:22.5, width:35.2, height:42.3 },
    note:{ left:38,  top:12.5, rot:-2 } },

  { id:'skills',     cn:'技能',  en:'Skills',
    box:{ left:0,    top:53.5, width:27,   height:15.5 },
    note:{ left:20,  top:44,   rot:2 } },

  { id:'experience', cn:'经历',  en:'Experience',
    box:{ left:65.5, top:2,    width:15.6, height:21.7 },
    note:{ left:48,  top:5,    rot:-3 } },

  { id:'about',      cn:'关于',  en:'About',
    box:{ left:71.8, top:30,   width:25.7, height:70 },
    note:{ left:58,  top:76,   rot:2 } },
];

/* what a click does — swap for your router */
function onSelect(id){
  document.getElementById('readout').innerHTML = '已选择 <b>'+id+'</b> — 在 onSelect() 里接你的路由';
  // e.g. navigate(`/${id}`)  or  document.getElementById(id).scrollIntoView({behavior:'smooth'})
}

/* build hotspot DOM */
const spotsEl = document.getElementById('spots');
for(const s of SPOTS){
  const btn = document.createElement('button');
  btn.className = 'spot';
  btn.type = 'button';
  btn.setAttribute('aria-label', `${s.cn} ${s.en}`);
  btn.style.cssText =
    `left:${s.box.left}%;top:${s.box.top}%;width:${s.box.width}%;height:${s.box.height}%`;
  btn.innerHTML = '<span class="pin"></span>';
  btn.addEventListener('click', () => onSelect(s.id));

  const note = document.createElement('div');
  note.className = 'note';
  note.style.cssText = `left:${s.note.left}%;top:${s.note.top}%;--rot:${s.note.rot}deg`;
  note.innerHTML = `<b>${s.cn}</b><span>${s.en}</span>`;

  spotsEl.append(btn, note);
}
/* fade the idle pins once the user has engaged */
spotsEl.addEventListener('pointerenter', () => spotsEl.classList.add('touched'), { once:true });

/* ==================================================================
   PETALS / MOTES  (unchanged from the animated build)
   ================================================================== */
const CFG = { petalCount:46, fallSpeed:.16, swayAmount:.55, windBase:.10,
              gustStrength:.30, gustEvery:9, moteCount:26, artWidth:420 };
const PETAL_COLORS = ['#f6bcd0','#efa5be','#fad7e3','#e991b0','#fdeaf1'];

const cv=document.getElementById('fx'), ctx=cv.getContext('2d'), hero=document.getElementById('hero');
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
let AW=CFG.artWidth, AH=0, running=true, t0=null, raf=0;
const rand=(a,b)=>a+Math.random()*(b-a);

function resize(){
  const r=hero.getBoundingClientRect(); if(!r.width) return;
  AH=Math.round(AW*r.height/r.width); cv.width=AW; cv.height=AH;
  ctx.imageSmoothingEnabled=false;
}
new ResizeObserver(resize).observe(hero); resize();

const makePetal=s=>({x:rand(-20,AW+20),y:s?rand(-AH,AH):rand(-30,-4),z:rand(.45,1),
  phase:rand(0,6.283),spin:rand(.018,.045),swayFreq:rand(.010,.024),
  c:PETAL_COLORS[(Math.random()*PETAL_COLORS.length)|0],drop:rand(.8,1.3)});
const makeMote=()=>({x:rand(0,AW),y:rand(0,AH),z:rand(.3,1),ph:rand(0,6.28),sp:rand(.004,.012)});
let petals=Array.from({length:CFG.petalCount},()=>makePetal(true));
const motes=Array.from({length:CFG.moteCount},makeMote);

function drawPetal(p){
  const flip=Math.abs(Math.cos(p.phase));
  const w=Math.max(1,Math.round((1+flip*2.2)*p.z)), h=Math.max(1,Math.round(2*p.z));
  const x=Math.round(p.x), y=Math.round(p.y);
  ctx.globalAlpha=.55+p.z*.45; ctx.fillStyle=p.c; ctx.fillRect(x,y,w,h);
  if(w>1){ ctx.globalAlpha*=.55; ctx.fillRect(x+(Math.cos(p.phase)>0?w:-1),y,1,Math.max(1,h-1)); }
  ctx.globalAlpha=1;
}

function frame(ts){
  if(!running) return;
  if(t0===null) t0=ts;
  const t=(ts-t0)/1000;
  ctx.clearRect(0,0,AW,AH);
  const gp=(t%CFG.gustEvery)/CFG.gustEvery;
  const gust=Math.max(0,Math.sin(gp*6.283))**2*CFG.gustStrength;

  ctx.fillStyle='#fff3d6';
  for(const m of motes){
    m.ph+=m.sp; m.x+=.05+gust*.3; m.y+=Math.sin(m.ph)*.05-.012;
    if(m.x>AW) m.x=0; if(m.y<-2) m.y=AH*.75;
    if(m.x>AW*.62||m.y>AH*.82) continue;
    ctx.globalAlpha=(.10+.28*Math.abs(Math.sin(m.ph)))*m.z;
    ctx.fillRect(Math.round(m.x),Math.round(m.y),1,1);
  }
  ctx.globalAlpha=1;

  for(const p of petals){
    p.phase+=p.spin;
    p.y+=CFG.fallSpeed*p.drop*(.5+p.z);
    p.x+=(CFG.windBase+gust)*(.4+p.z)+Math.sin(p.y*p.swayFreq+p.phase)*CFG.swayAmount*p.z;
    if(p.y>AH+6||p.x>AW+24||p.x<-24){
      Object.assign(p,makePetal(false));
      if(Math.random()<.35) p.x=rand(-24,AW*.4);
    }
    drawPetal(p);
  }
  raf=requestAnimationFrame(frame);
}
const start=()=>{ if(!running){ running=true; t0=null; raf=requestAnimationFrame(frame);} };
const stop =()=>{ running=false; cancelAnimationFrame(raf); };
document.addEventListener('visibilitychange',()=>document.hidden?stop():start());
new IntersectionObserver(e=>e[0].isIntersecting?start():stop(),{threshold:0}).observe(hero);

if(reduce) raf=requestAnimationFrame(ts=>{frame(ts);stop();});
else raf=requestAnimationFrame(frame);
</script>
